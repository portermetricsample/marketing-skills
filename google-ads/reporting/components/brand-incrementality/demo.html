<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>brand-incrementality — demo (fictional Northwind)</title>
  <!--
    DEMO-ONLY styling. NOT the component's CSS — it ships zero CSS; porter-design owns appearance.
    These rules define the porter-design TOKENS the component references (donut colours, --good/--bad)
    + minimal chrome, so the component is legible standalone. Not the real theme.
  -->
  <style>
    :root{
      --surface-bg:#fff; --surface-card:#fff; --surface-soft:#fbf7f2; --text-title:#1c1133; --text-body:#3a3550;
      --text-muted:#7a7390; --line:#ece8f3; --ink:#6d28d9; --accent:#7c3aed;
      --good:#16a34a; --bad:#dc2626; --flat:#8b8a99;
      --bi-nonbrand:#6d28d9; --bi-brand:#e7dffb;
    }
    body{background:var(--surface-bg);color:var(--text-body);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;padding:34px}
    .wrap{max-width:980px;margin:0 auto}
    /* component hooks (previewed with tokens) */
    .bi-head{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
    .bi-eyebrow{flex-basis:100%;font-weight:800;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
    .bi-title{font-size:30px;font-weight:800;color:var(--text-title);margin:2px 0;flex:1}
    .bi-toggle{display:inline-flex;background:var(--surface-soft);border-radius:999px;padding:4px}
    .bi-tog{border:0;background:transparent;padding:8px 16px;border-radius:999px;font-weight:700;font-size:13.5px;color:var(--text-muted);cursor:pointer}
    .bi-tog--on{background:var(--ink);color:#fff}
    .bi-intro{color:var(--text-body);font-size:15px;max-width:760px;margin:10px 0 26px}
    .bi-ink{color:var(--ink);font-weight:700;border-bottom:2px solid #5eead4}
    .bi-host{}
    .bi-donut-wrap{display:inline-flex;align-items:center;gap:26px;vertical-align:top}
    .bi-donut{width:190px;height:190px;border-radius:50%;background:conic-gradient(var(--bi-nonbrand) 0 var(--bi-split),var(--bi-brand) var(--bi-split) 100%);position:relative}
    .bi-donut-hole{position:absolute;inset:27%;border-radius:50%;background:var(--surface-card);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .bi-donut-k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted)}
    .bi-donut-v{font-size:24px;font-weight:800;color:var(--text-title)}
    .bi-legend{list-style:none;margin:0;padding:0;font-weight:700;color:var(--text-title)}
    .bi-legend li{display:flex;align-items:center;gap:9px;margin:8px 0}
    .bi-dot{width:13px;height:13px;border-radius:4px;display:inline-block}
    .bi-legend--nonbrand .bi-dot{background:var(--bi-nonbrand)} .bi-legend--brand .bi-dot{background:var(--bi-brand)}
    .bi-cards{display:inline-block;margin-left:40px;vertical-align:top}
    .bi-cards-eyebrow{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);margin-bottom:12px}
    .bi-card-row{display:flex;gap:14px}
    .bi-card{background:var(--surface-soft);border-radius:16px;padding:16px 20px;min-width:130px}
    .bi-card--hi{background:var(--ink);color:#fff}
    .bi-card-k{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-muted)}
    .bi-card--hi .bi-card-k{color:#d9ccf7}
    .bi-card-v{font-size:30px;font-weight:800;margin:4px 0 8px;color:var(--text-title)}
    .bi-card--hi .bi-card-v{color:#fff}
    .bi-delta{font-size:12px;font-weight:800;padding:3px 9px;border-radius:999px;background:#fff}
    .bi-delta--good{color:var(--good)} .bi-delta--bad{color:var(--bad)} .bi-delta--flat{color:var(--flat)}
    .bi-card--hi .bi-delta{background:rgba(255,255,255,.16)} .bi-card--hi .bi-delta--good{color:#bbf7d0} .bi-card--hi .bi-delta--bad{color:#fecaca}
    .bi-caption{color:var(--text-body);max-width:620px;margin:30px 0 0;margin-left:255px}
  </style>
</head>
<body>
  <div class="wrap"><div id="host"></div></div>
  <script src="./brand-incrementality.js"></script>
  <script src="./example.data.js"></script>
  <script>
    var D = window.BI_EXAMPLE;
    window.PorterReporting.brandIncrementality.mount("#host", {
      rows: D.rows, previousRows: D.previousRows, brandName: D.brandName
    });
  </script>
</body>
</html>
